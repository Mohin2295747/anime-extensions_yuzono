name: CI

on:
  push:
    branches:
      - master
    paths:
      - '**'
      - '!**.md'
      - '!.github/**'
      - '.github/scripts/**'
      - '.github/workflows/build_push.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 15
  IS_PR_CHECK: false

jobs:
  prepare:
    permissions:
      contents: write
    name: Prepare job
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      latestCommitMessage: ${{ steps.set-env.outputs.LATEST_COMMIT_MESSAGE }}
      matrix: ${{ steps.generate-matrices.outputs.matrix }}

    steps:
      - name: Checkout ${{ github.ref_name }} branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set env
        id: set-env
        run: |
          echo "LATEST_COMMIT_MESSAGE<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "Built on commit: $(git log -1 --pretty=%H)" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate full matrix (always build)
        id: generate-matrices
        run: |
          python ./.github/scripts/generate-build-matrices.py "" Release

  build:
    name: Build extensions (${{ matrix.chunk.number }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout ${{ github.ref_name }} branch
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare signing key
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > signingkey.jks
          chmod 600 signingkey.jks

      - name: Build extensions (${{ matrix.chunk.number }})
        env:
          MODULES: ${{ join(matrix.chunk.modules, ' ') }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew $MODULES

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks-${{ matrix.chunk.number }}
          path: "**/*.apk"

      - name: Clean up CI files
        run: rm -f signingkey.jks

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Downloading all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute next version tag
        id: version
        run: |
          git fetch --tags

          version_tags=$(git tag -l "v*.*.*.*" | sort -V)

          if [ -z "$version_tags" ]; then
            next_version="v0.0.0.1"
          else
            latest_tag=$(echo "$version_tags" | tail -n1)
            IFS='.' read -ra parts <<< "${latest_tag#v}"

            pos=3
            while [ $pos -ge 0 ]; do
              parts[$pos]=$((parts[$pos] + 1))
              if [ ${parts[$pos]} -lt 10 ]; then
                break
              fi
              parts[$pos]=0
              pos=$((pos - 1))
            done

            next_version="v${parts[0]}.${parts[1]}.${parts[2]}.${parts[3]}"
          fi

          echo "tag=$next_version" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          find artifacts -name "*.apk" -type f | sed 's|.*/||' | sort > notes.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            artifacts/**/*.apk \
            --title "Extensions" \
            --notes-file notes.txt \
            --latest