name: CI

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build all extensions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Prepare signing key
        run: |
          echo ${{ secrets.SIGNING_KEY }} | base64 -d > signingkey.jks
          chmod 600 signingkey.jks

      - name: Build all extensions
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease

      - name: Upload APKs as artifacts (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: all-apks
          path: '**/*.apk'
          if-no-files-found: error

      - name: Clean up
        run: rm signingkey.jks

  create_release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - name: Checkout (for git tags)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          name: all-apks
          path: ./apks

      - name: Compute next version tag
        id: version
        run: |
          git fetch --tags
          latest_tag=$(git tag -l "v*.*.*.*" | sort -V | tail -n1)
          if [ -z "$latest_tag" ]; then
            next_version="v0.0.0.1"
          else
            IFS='.' read -ra parts <<< "${latest_tag#v}"
            parts[3]=$((parts[3] + 1))
            next_version="v${parts[0]}.${parts[1]}.${parts[2]}.${parts[3]}"
          fi
          echo "tag=$next_version" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          find ./apks -name "*.apk" -type f -exec basename {} \; | sort >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub Release with APKs
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          apk_files=$(find ./apks -name "*.apk" -type f)
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Extensions" \
            --notes "${{ env.RELEASE_NOTES }}" \
            --latest \
            --repo ${{ github.repository }} \
            $apk_files