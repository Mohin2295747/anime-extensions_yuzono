name: CI

on:
  push:
    branches:
      - master
    paths:
      - '**'
      - '!**.md'
      - '!.github/**'
      - '.github/scripts/**'
      - '.github/workflows/build_push.yml'
  # Manual trigger
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 15
  IS_PR_CHECK: false

jobs:
  prepare:
    permissions:
      contents: write
    name: Prepare job
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      latestCommitMessage: ${{ steps.set-env.outputs.LATEST_COMMIT_MESSAGE }}
      matrix: ${{ steps.generate-matrices.outputs.matrix }}
      delete: ${{ steps.generate-matrices.outputs.delete }}
    steps:
      - name: Checkout ${{ github.ref_name }} branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set env
        id: set-env
        run: |
          echo "LATEST_COMMIT_MESSAGE<<{delimiter}
          $(git log -1 --pretty=%B)

          Built on commit: $(git log -1 --pretty=%H)
          {delimiter}" >> $GITHUB_OUTPUT

      - name: Find lib changes
        id: modified-libs
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: lib/
          files_ignore: lib/**.md
          files_separator: " "
          safe_output: false

      - name: Bump extensions that use a modified lib
        if: steps.modified-libs.outputs.any_changed == 'true' && github.repository == 'yuzono/anime-extensions'
        env:
          COMMIT_MESSAGE: ${{ steps.set-env.outputs.LATEST_COMMIT_MESSAGE }}
        run: |
          latest_commit_author=$(git log -1 --pretty=%an)
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          chmod +x ./.github/scripts/bump-versions.py
          ./.github/scripts/bump-versions.py "$COMMIT_MESSAGE" ${{ steps.modified-libs.outputs.all_changed_files }}
          git push

      - name: Get last successful CI commit
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5.0.1
        with:
          main-branch-name: ${{ github.ref_name }}
          fallback-sha: 4b825dc642cb6eb9a060e54bf8d69288fbee4904 # empty tree

      - id: generate-matrices
        name: Create output matrices
        run: |
          python ./.github/scripts/generate-build-matrices.py "$NX_BASE" Release

  build:
    name: Build extensions (${{ matrix.chunk.number }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ toJson(fromJson(needs.prepare.outputs.matrix).chunk) != '[]' }}
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout ${{ github.ref_name }} branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: ${{ matrix.chunk.number > 1 }}

      - name: Prepare signing key
        run: |
          echo ${{ secrets.SIGNING_KEY }} | base64 -d > signingkey.jks
          chmod 600 signingkey.jks

      - name: Build extensions (${{ matrix.chunk.number }})
        env:
          MODULES: ${{ join(matrix.chunk.modules, ' ') }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew $MODULES

      - name: Upload APKs to temporary release
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          # Find all APK files in this chunk
          apk_files=$(find . -name "*.apk" -type f)
          
          if [ -n "$apk_files" ]; then
            # Check if temp release exists
            if gh release view "temp-build" --repo ${{ github.repository }} 2>/dev/null; then
              # Upload to existing release
              echo "$apk_files" | while read -r apk; do
                gh release upload "temp-build" "$apk" --clobber --repo ${{ github.repository }}
                echo "Uploaded: $(basename "$apk")"
              done
            else
              # Create release with first APK
              first_apk=$(echo "$apk_files" | head -1)
              gh release create "temp-build" --title "Temporary Build" --notes "Building..." "$first_apk" --repo ${{ github.repository }}
              echo "Created temp release and uploaded: $(basename "$first_apk")"
              
              # Upload remaining APKs
              echo "$apk_files" | tail -n +2 | while read -r apk; do
                gh release upload "temp-build" "$apk" --repo ${{ github.repository }}
                echo "Uploaded: $(basename "$apk")"
              done
            fi
          fi

      - name: Clean up CI files
        run: rm signingkey.jks

  finalize_release:
    name: Finalize Release
    needs: build
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository == 'yuzono/anime-extensions'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Wait for all uploads to complete
        run: sleep 30

      - name: Check if temp release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          if gh release view "temp-build" --repo ${{ github.repository }} 2>/dev/null; then
            echo "RELEASE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "RELEASE_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Skip if no temp release
        if: env.RELEASE_EXISTS == 'false'
        run: |
          echo "No temporary release found. Skipping release creation."
          exit 0

      - name: Get APK count from temp release
        id: count
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          # Get the release ID for "temp-build"
          release_id=$(gh release view "temp-build" --repo ${{ github.repository }} --json id -q .id)
          
          # Get all assets for the release and count APKs
          apk_count=$(gh api "/repos/${{ github.repository }}/releases/$release_id/assets" --jq '[.[] | select(.name | endswith(".apk"))] | length')
          
          echo "APK_COUNT=$apk_count" >> $GITHUB_ENV
          echo "Found $apk_count APK files in temp release"

      - name: Skip if no APKs found
        if: env.APK_COUNT == 0
        run: |
          echo "No APK files found. Skipping release creation."
          exit 0

      - name: Compute next version tag
        id: version
        run: |
          # Fetch all tags
          git fetch --tags
          
          # Find existing version tags
          version_tags=$(git tag -l "v*.*.*.*" | sort -V)
          
          if [ -z "$version_tags" ]; then
            next_version="v0.0.0.1"
          else
            latest_tag=$(echo "$version_tags" | tail -n1)
            IFS='.' read -ra parts <<< "${latest_tag#v}"
            
            # Increment last part with carry-over (base 10)
            pos=3
            while [ $pos -ge 0 ]; do
              parts[$pos]=$((parts[$pos] + 1))
              if [ ${parts[$pos]} -lt 10 ]; then
                break
              fi
              parts[$pos]=0
              pos=$((pos - 1))
            done
            
            next_version="v${parts[0]}.${parts[1]}.${parts[2]}.${parts[3]}"
          fi
          
          echo "Next version: $next_version"
          echo "tag=$next_version" >> $GITHUB_OUTPUT

      - name: Get APK filenames for release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          # Get release ID
          release_id=$(gh release view "temp-build" --repo ${{ github.repository }} --json id -q .id)
          
          # Get list of APK filenames
          apk_names=$(gh api "/repos/${{ github.repository }}/releases/$release_id/assets" --jq '[.[] | select(.name | endswith(".apk")) | .name] | sort | .[]')
          
          # Create release notes with one filename per line
          notes=""
          while IFS= read -r name; do
            notes="${notes}${name}\n"
          done <<< "$apk_names"
          
          # Save to environment variable
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo -e "$notes" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          echo "Release notes generated with $(echo "$apk_names" | wc -l) APK files"

      - name: Rename temp release to versioned release
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          # Update the release tag, title, and notes (preserves all assets)
          gh release edit "temp-build" \
            --tag "${{ steps.version.outputs.tag }}" \
            --title "Extensions" \
            --notes "${{ env.RELEASE_NOTES }}" \
            --latest \
            --repo ${{ github.repository }}
          
          echo "✅ Release successfully created as ${{ steps.version.outputs.tag }}"
          echo "📦 Total APKs: $(gh release view "${{ steps.version.outputs.tag }}" --repo ${{ github.repository }} --json assets -q '.assets | length')"